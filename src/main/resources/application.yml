# src/main/resources/application.yml для cargo-service

server:
  port: 8085

spring:
  profiles:
    active: dev

  application:
    name: be-logistics-platform-cargo-service

  # DataSource для PostgreSQL (Единая общеплатформенная БД)
  datasource:
    url: jdbc:postgresql://localhost:5433/logistics_platform_db?currentSchema=cargo_schema # 👈 Изменили порт на 5433, база данных и схема сохранены прежние
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jackson:
    serialization: # чтобы Jackson правильно сериализует/десериализует.
      write-dates-as-timestamps: false
    time-zone: Europe/Moscow

  # JPA / Hibernate базовые настройки
  jpa:
#    hibernate:
#      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
        default_schema: cargo_schema
    open-in-view: false

  # Общий Liquibase
  liquibase:
    enabled: true
#    enabled: false   # временно отключаем Liquibase
    change-log: classpath:db/changelog/db.changelog-master.xml
    default-schema: cargo_schema
#    rollback-file: classpath:db/changelog/rollback.sql  # файл для SQL отката

  # Настройки баз данных Spring Data
  data:
    mongodb:
      # 👈 Внедряем специфичную переменную с дефолтным значением для логистики грузов
      uri: ${LOGISTICS_CARGO_MONGO_URI:mongodb://localhost:27018/logistics_cargo_mongo_db}

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/logistics
#          jwk-set-uri: http://localhost:8080/realms/logistics/protocol/openid-connect/certs

logging:
  level:
    com.innowise.logistics.cargoservice: DEBUG
    liquibase: INFO
