# src/main/resources/application-prod.yml (продакшен — через переменные)

spring:
  datasource:
    url: ${DB_URL} # Например: jdbc:postgresql://prod-postgres-host:5432/logistics_platform_db?currentSchema=cargo_schema
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate # На проде — строгая валидация, никаких авто-изменений таблиц!

logging:
  level:
    com.innowise.logistics.cargoservice: INFO
